<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Quote - Ethanlee Services</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #218838;
    }
  </style>
</head>
<body>

<header>
  <h1>Ethanlee Services</h1>
  <p>Get a Free Quote</p>
</header>

<div class="container">
  <form action="https://formsubmit.co/ethanleeanthony134.com" method="POST">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="email" name="email" placeholder="Email Address" required>

    <select name="service" required>
      <option value="">Select Service</option>
      <option>Junk Removal</option>
      <option>Pressure Washing</option>
      <option>Metal Removal</option>
      <option>Other</option>
    </select>

    <textarea name="details" rows="5" placeholder="Describe the job (size, heavy items, location, etc.)"></textarea>

    <input type="hidden" name="_captcha" value="false">

    <button type="submit">Request Quote</button>
  </form>
</div>

</body>
</html>
